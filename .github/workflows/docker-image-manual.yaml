name: Docker Images With Manual Mode

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest tailscale version
        id: version
        run: |
          TAILSCALE_VERSION=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r '.tag_name')
          echo "Latest tailscale version: $TAILSCALE_VERSION"
          echo "version=$TAILSCALE_VERSION" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          GHCR_TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GHCR_TOKEN" \
            https://ghcr.io/v2/${{ github.repository }}/manifests/${{ steps.version.outputs.version }}-manual
            )
          IMAGE_EXISTS=$(if [ $HTTP_CODE -eq 200 ]; then echo "true"; else echo "false"; fi)
          echo "HTTP code: $HTTP_CODE, Image exists: $IMAGE_EXISTS"
          echo "should_build=$(if [ $IMAGE_EXISTS == "true" ]; then echo "false"; else echo "true"; fi)" >> $GITHUB_OUTPUT

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      TAILSCALE_VERSION: ${{ needs.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Print tailscale version
        run: echo "Latest tailscale version: ${{ env.TAILSCALE_VERSION }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.manual
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest-manual
            ghcr.io/${{ github.repository }}:${{ env.TAILSCALE_VERSION }}-manual
          labels: |
            org.opencontainers.image.title=Tailscale DERP Server
            org.opencontainers.image.description=DERP server with manual mode for Tailscale.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.TAILSCALE_VERSION }}
            org.opencontainers.image.ref.name=${{ env.TAILSCALE_VERSION }}-manual
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.authors=Misklinga <support@misklinga.com>
          platforms: linux/amd64,linux/arm64
          build-args: |
            DERP_VERSION=${{ env.TAILSCALE_VERSION }}
